<!DOCTYPE html>
<html>
<head>
    <title>Post Job</title>
</head>
<body>

<h1>Post Job</h1>

<form method="POST">

<input type="text" name="manager_name" placeholder="Manager Name" required><br><br>

<input type="text" name="title" placeholder="Job Title" required><br><br>

<textarea name="description" placeholder="Job Description"></textarea><br><br>

<input type="number" name="pay" placeholder="Pay Amount" required><br><br>

<input type="number" name="required_count" placeholder="Required Candidates" required><br><br>

<label>Expiry Time</label><br>
<input type="datetime-local" name="expiry_time" required><br><br>

<button type="submit">Post Job</button>

</form>

</body>
</html>
